# Reference paths for the VLN benchmark, in the Vicon WORLD frame (metres).
# Fill in the [x, y] of each waypoint by driving/teleoping the ideal path
# once and reading Vicon, or by measuring landmark positions directly.
#   reference_path : ordered waypoints describing the INTENDED route
#                    (start -> ... -> goal). Used for nDTW and ref_len.
#   goal           : target point; defaults to the last waypoint if omitted.
#   threshold      : success radius in metres (default 1.0).
#   ref_len        : optional explicit reference length; else computed from path.
# Keep waypoints reasonably spaced (~0.25 m or coarser is fine; the code
# densifies internally). More waypoints on curves = a faithful reference shape.

routes:
  R01:
    # 3 waypoints suggested (0 turn(s)). Replace zeros with measured coords.
    reference_path:
      - [0.0, 0.0]   # wp0
      - [0.0, 0.0]   # wp1
      - [0.0, 0.0]   # wp2
    goal: [0.0, 0.0]
    threshold: 1.0

